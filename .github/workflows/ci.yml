name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (micromamba + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba env
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: backend/environment.yml
          cache-environment: true

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend (pnpm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
