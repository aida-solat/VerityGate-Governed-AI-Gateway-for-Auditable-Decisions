name: Feature request
description: Suggest an idea or improvement for VerityGate
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? Who is it for?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: governance
    attributes:
      label: Governance impact
      description: >
        Does this affect gate decisions, evaluation, or the audit ledger?
        Note that the LLM must never decide gate outcomes on its own.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
