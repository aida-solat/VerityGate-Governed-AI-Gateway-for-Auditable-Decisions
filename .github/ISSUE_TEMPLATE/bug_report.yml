name: Bug report
description: Report a problem with VerityGate
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, request payloads, or commands to reproduce.
      placeholder: |
        1. Start the backend with ...
        2. POST /ai/complete with ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend / API
        - Governance / evaluation
        - RAG / retrieval
        - Ledger
        - Frontend dashboard
        - CI / tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node versions, provider (mock/openai/anthropic).
    validations:
      required: false
