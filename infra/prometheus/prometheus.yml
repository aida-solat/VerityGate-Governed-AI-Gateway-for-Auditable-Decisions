global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: veritygate-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8009"]
        labels:
          service: veritygate-backend

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector
